name: Publish Docker image (release)

on:
  push:
    branches:
      - main
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="main-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "$VERSION" > VERSION
          echo "IS_TAG=$([[ "$GITHUB_REF" == refs/tags/* ]] && echo true || echo false)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            guygubaby/new-api:${{ env.VERSION }}-${{ matrix.arch }}
            ${{ env.IS_TAG == 'true' && format('guygubaby/new-api:latest-{0}', matrix.arch) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            VERSION="main-$(echo $GITHUB_SHA | cut -c1-7)"
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push manifest (versioned)
        run: |
          docker buildx imagetools create \
            -t guygubaby/new-api:${VERSION} \
            guygubaby/new-api:${VERSION}-amd64 \
            guygubaby/new-api:${VERSION}-arm64

      - name: Push manifest (latest)
        if: env.IS_TAG == 'true'
        run: |
          docker buildx imagetools create \
            -t guygubaby/new-api:latest \
            guygubaby/new-api:latest-amd64 \
            guygubaby/new-api:latest-arm64
